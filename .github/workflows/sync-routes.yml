name: Sync Routes from Market Offerings

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *" # Daily at 06:00 UTC

jobs:
  sync-routes:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Sync routes.json from market_offerings.json
        run: node scripts/sync-routes-from-market-offerings.mjs

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet src/data/routes.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated routes.json
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/routes.json
          git commit -m "chore: sync routes.json from market_offerings.json [skip ci]"
          git push

      - name: Already up to date
        if: steps.diff.outputs.changed == 'false'
        run: echo "routes.json is already up to date — no commit needed"
