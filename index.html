<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Wildfly</title>
    <meta name="description" content="Explore flights, discover destinations, and plan your next adventure.">
    <meta name="author" content="Wildfly" />

    <!-- Viewport — prevent zoom on iOS inputs -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA — iOS full-screen mode -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Wildfly" />
    <meta name="theme-color" content="#0a0a0a" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="512x512" href="/assets/icons/icon-512.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/assets/icons/icon-192.png" />

    <!-- iOS touch icon (shown on home screen) -->
    <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Quicksand:wght@300;400;500;600;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Wildfly" />
    <meta property="og:description" content="Explore flights, discover destinations, and plan your next adventure." />
    <meta property="og:image" content="/assets/icons/icon-512.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Wildfly" />
    <meta name="twitter:description" content="Explore flights, discover destinations, and plan your next adventure." />
    <meta name="twitter:image" content="/assets/icons/icon-512.png" />
</head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <style>
      /* Hide Lovable editor badge */
      lovable-badge, [data-lovable-badge], #lovable-badge { display: none !important; }
    </style>
  </body>
</html>
